paths:
  custom_videos_root: assets/custom_videos
  deeplearning_weights_dir: assets/deeplearning_weights
  video_depth_anything_path: null
preprocess:
  pipeline:
    skip_existing: true
    force: false
  frames:
    max_len: -1
    target_fps: -1
    skip_frames: 1
    max_res: 1280
    jpg_quality: 95
    frame_name_pattern: '{:05d}.jpg'
  motion_3d:
    encoder: vits
    input_size: 392
    max_res: 480
    max_len: -1
    target_fps: -1
    fp32: false
    device: cuda
    skip_frames: 1
    subsample: 1.0
  dino:
    target_h: 520
    target_w: 960
    patch_size: 14
    n_components: 10
    device: cuda
  sam_frame0:
    model: sam2.1_l.pt
    min_threshold: 0.15
    seed: 42
    frame_name: 00000.jpg
pseudo_gt:
  model: sam2.1_l.pt
  min_threshold: 0.15
  iou_threshold: 0.3
  prefer_video: true
  video_imgsz: 1024
  max_objects: 12
  video_chunk_frames: 16
  detect_new_objects: true
tracking:
  pipeline:
    skip_existing: false
    force: false
  measure_fps: true
  num_blobs: 64
  num_hyperblobs: 4
  datapoint_retain_pct: 81.25
  random_seed: 42
  focal_length: 520.0
  use_sam_frame0: true
  init_gibbs_sweeps: 21
  tracking_outlier_prob: 1.0e-28
  dense_disable_outlier_prob: false
  # Self-supervised calibration (Step 2): if true, sigma_F / sigma_F_H below are
  # OVERRIDDEN at init by the empirical within-cluster DINO feature variance
  # (~0.5 / ~0.4 on test).  OFFLINE (scripts/diagnose_streaming.py, cached
  # ~zero-velocity motion) this lifts live-clusters<->SAM ARI 0.06 -> 0.52 and
  # drops outlier_frac 0.20 -> 0.02.  But in the LIVE demo it REGRESSES outlier
  # (0.25 -> 0.58): tight sigma_F ejects the feature mismatches the live
  # SEA-RAFT/depth + looping-during-init regime produces, exactly the
  # "sigma_F<0.5 -> everything outlier" failure the bayesopt sigma_F=9.04 avoided.
  # Left OFF pending a live-depth/flow diagnose harness to tune for that regime.
  calibrate_feature_sigmas: false
  blob_counting_threshold: 0
  hyperparams:
    sigma_F: 9.044196019192926
    sigma_F_H: 2.0
    outlier_prob: 2.368796593121853
    outlier_velocity_gamma_shape: 1.6884034699760377
    outlier_velocity_gamma_rate: 2.2876265650213488
    alpha: 1.6833335733111996
    beta: 2.568945821899056
    sigma_H: 20.433032973338854
    sigma_V: 17719855363262.03
    translation_gaussian_scale: 0.4676176212728024
    translation_max_radius: 0.42811625488102434
    translation_num_radii_cells: 17
    translation_theta_step_deg: 23.25428342446685
    rotation_vmf_kappa: 114.48296422989405
    rotation_angle_max_deg: 19.748530313372612
    rotation_angle_step_deg: 0.2130881153213785
viz:
  pipeline:
    skip_existing: false
    force: false
  point_radius: 0.015
  flow_arrow_scale: 1.0
  ellipsoid_sigma_scale: 1.0
  feature_pca_seed: 42
  include_assignment_colors: true
  include_hyperblob_assignment_colors: true
  include_flow: true
  include_depth: true
_meta:
  source: bayesopt v3_moo_3hr trial 36
  pick_by: min
  per_video_min_persistent_iou: 0.27885445926174496
  per_video_max_persistent_iou: 0.9169814296764947
  mean_persistent_iou: 0.6338333354879983
  per_video_persistent_iou:
    gray_jacket: 0.5705885580978912
    jello_trim: 0.4626123311798245
    new_eagle_trim: 0.7361149210358765
    purple_jacket: 0.27885445926174496
    snake_trim: 0.879981959362897
    wine_swirl: 0.9169814296764947
    two_blocks_centered: 0.5916996898012589
  softmin_persistent_iou: 0.46418671782409965
  softmin_tau: 4.0
