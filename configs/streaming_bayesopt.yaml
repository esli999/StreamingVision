# StreamingVision bayesopt — narrowed search space + faster phase.
#
# Empirical learnings from the first run (37 trials, only ~20% valid):
#  * Sobol kept proposing tracking_outlier_prob >= 1e-10 — turns the whole
#    dense assignment into outliers, gives 99%+ invalid fraction.
#  * Same for sigma_F < 0.5 (too-tight feature likelihood → everything outlier)
#    and outlier_prob < 0.5 (init Gibbs can't down-weight K-means seed mismatches).
#  * The 10% max_outlier_pct cap killed a 0.18 IoU trial (Trial 40) at 17.6%
#    outliers — that's a real signal we shouldn't throw away on a short video.
#
# Net effect: ~3x faster wall-clock (fewer wasted trials) + LCB explores the
# region around the known-good Sobol basin (sigma_F~2, outlier_prob~5,
# sigma_H~50-80) more efficiently.

run:
  master_seed: 42
  output_root: assets/custom_videos/{video_id}/bayesopt
  resume: false

objective:
  match_iou_threshold: 0.0
  score_iou_threshold: 0.5
  # Raised from 10 -> 20 — see comment above.  Trials with > 20 % outliers
  # still get score 0 (visualization unusable).
  max_outlier_pct: 20.0

phase:
  # v3: switch from single-objective LCB to multi-objective qNEHVI.  Every
  # video gets its own Ax objective; we score each trial on the Pareto
  # front of per-video IoUs instead of scalarizing to one number.
  phase_a_sobol_evals: 24
  fresh_model_proposal_method: candidate_pool_lcb   # legacy, ignored by MO
  candidate_pool_size: 4096
  # qNEHVI hypervolume reference point — per-video IoU below this value
  # contributes zero to the acquisition.  Pick well below the v2 accuracy
  # gate's 0.55 floor so v1-broken trials still rank by their actual IoU.
  per_video_iou_threshold: 0.3
  # Fan out the 7 per-trial video evaluations across GIL-releasing JAX
  # threads.  Tested 2026-05-21:
  #   - 4-way → GPU OOM at max_frames=128 even with MEM_FRACTION=0.85
  #     (workers don't share JAX working memory enough)
  #   - 2-way → host RAM OOM (~60 GB anon-RSS) after 7 trials; the
  #     ThreadPoolExecutor compounds JAX buffer accumulation across
  #     concurrent run_dino_tracking invocations and the kernel
  #     oom-killer fires
  # Conclusion on this 62 GB RAM / 32 GB GPU box: serial-only is the
  # only stable configuration.  Set parallel_videos>1 if profiling
  # confirms the leak has been mitigated.
  parallel_videos: 1
  # softmin_tau is now diagnostic only (kept in meta for the accuracy
  # gate report); the MO BO doesn't aggregate.
  softmin_tau: 4.0
  # Phase-specific subsets — disabled in v3 since parallel evaluation
  # makes the Sobol-fast-subset trick redundant; left null so the
  # mechanism stays available for ad-hoc reuse.
  sobol_video_subset: null
  lcb_video_subset: null
  # Optional warm-start: load a previously-evaluated trial as Ax's
  # first arm so the surrogate has a known-good Pareto point before
  # Sobol starts.  Comment out to skip.
  warm_start:
    video_id: gray_jacket
    run_id: '20260521_000113'
    trial_index: 26

# Narrowed ranges: keep priors centered on the branch's known-good DAVIS
# defaults, with enough log-scale room for the Gaussian-process LCB to learn
# curvature.
search_space:
  # trial 26 pinned at sigma_F=4.97 on the v1 upper bound (5.0) — widen.
  - name: sigma_F
    lower: 0.5
    upper: 10.0
    log_scale: true
  # trial 26 pinned at outlier_prob=8.33 in the v1 top quartile — widen up.
  - name: outlier_prob
    lower: 0.5
    upper: 30.0
    log_scale: true
  # tracking_outlier_prob removed from search — Ax's range validator is
  # linear (rejects upper - lower < ~1e-4 even on log scale), and there's no
  # interesting optimization signal here.  Pinned to 1.0e-28 from
  # configs/streaming_default.yaml.
  - name: outlier_velocity_gamma_shape
    lower: 1.5
    upper: 8.0
  - name: outlier_velocity_gamma_rate
    lower: 0.1
    upper: 5.0
    log_scale: true
  - name: alpha
    lower: 0.3
    upper: 3.0
    log_scale: true
  - name: beta
    lower: 0.3
    upper: 3.0
    log_scale: true
  # trial 26 pinned at sigma_H=11.24 on the v1 lower bound (10.0) — widen down.
  - name: sigma_H
    lower: 3.0
    upper: 100.0
    log_scale: true
  # trial 26 pinned at sigma_V=5.4e13 near the v1 lower bound (1e13) — widen down.
  - name: sigma_V
    lower: 1.0e12
    upper: 1.0e15
    log_scale: true
  - name: translation_gaussian_scale
    lower: 0.1
    upper: 0.5
  - name: translation_max_radius
    lower: 0.2
    upper: 0.6
  - name: translation_num_radii_cells
    lower: 10
    upper: 20
    value_type: int
  - name: translation_theta_step_deg
    lower: 10.0
    upper: 30.0
  - name: rotation_vmf_kappa
    lower: 50.0
    upper: 500.0
    log_scale: true
  - name: rotation_angle_max_deg
    lower: 15.0
    upper: 35.0
  - name: rotation_angle_step_deg
    lower: 0.2
    upper: 1.0
    log_scale: true
  - name: init_gibbs_sweeps
    lower: 10
    upper: 25
    value_type: int
