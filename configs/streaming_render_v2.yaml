# StreamingVision demo config (streaming_render_v2.yaml) — AUTO-EMITTED.
# ONE GLOBAL config: the SAME calibrated hypers + global architectural-
# structure flags as streaming_general.yaml (the v2 cluster-freeze fix:
# feature_aware_final_assignment / final_assignment_outlier=false /
# freeze_hyperblob_assignment / pure_object_seed), with the demo's richer
# k-means-fallback num_hyperblobs=10 (SAM/GT frame-0 seed sets it
# dynamically). NO per-video knobs — the render grid reads the single
# tracking.num_blobs / blob_means_updates_per_frame.
#
# num_blobs=128, init_gibbs_sweeps=1, per-frame sweeps=1 (live demo runs 1).
# Scalar tuple + hypers learned SELF-SUPERVISED on the TRAIN split under this
# structure; validated ONCE on a held-out split. NO per-video tuning.
# Calibration-produced — do not hand-edit.
paths:
  custom_videos_root: assets/custom_videos
  deeplearning_weights_dir: assets/deeplearning_weights
  video_depth_anything_path: null
preprocess:
  pipeline:
    skip_existing: true
    force: false
  frames:
    max_len: -1
    target_fps: -1
    skip_frames: 1
    max_res: 1280
    jpg_quality: 95
    frame_name_pattern: '{:05d}.jpg'
  motion_3d:
    encoder: vits
    input_size: 392
    max_res: 480
    max_len: -1
    target_fps: -1
    fp32: false
    device: cuda
    skip_frames: 1
    subsample: 1.0
  dino:
    target_h: 520
    target_w: 960
    patch_size: 14
    n_components: 10
    device: cuda
  sam_frame0:
    model: sam2.1_l.pt
    min_threshold: 0.15
    seed: 42
    frame_name: 00000.jpg
pseudo_gt:
  model: sam2.1_l.pt
  min_threshold: 0.15
  iou_threshold: 0.3
  prefer_video: true
  video_imgsz: 1024
  max_objects: 12
  video_chunk_frames: 16
  detect_new_objects: true
